<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tnovel - 2주차 과제</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="canvas">
        
        <section class="phone-section">
            <div class="phone-wrapper">
                <div class="phone-container back-phone">
                    <img src="./images2/phone.svg" alt="" class="phone-frame">
                    <img src="./images2/camera.svg" alt="" class="phone-notch">
                    <div class="screen-content">
                        <img src="./images2/home.svg" alt="홈 화면">
                    </div>
                </div>

                <div class="phone-container front-phone">
                    <img src="./images2/phone.svg" alt="" class="phone-frame">
                    <img src="./images2/camera.svg" alt="" class="phone-notch">
                    <div class="screen-content">
                        <img src="./images2/login.svg" alt="로그인 화면">
                    </div>
                </div>
            </div>
        </section>

        <section class="login-section">
            <div class="white-box login-main">
                <h1 class="main-logo">
                    <img src="./images2/mainlogo.svg" alt="Tnovel">
                </h1>

                <div class="static-form">
                    <div class="input-field">
                        <img src="./images2/mail.svg" alt="" class="field-icon">
                        <input type="text" placeholder="전화번호, 사용자 이름 또는 이메일" readonly>
                    </div>
                    <div class="input-field">
                        <img src="./images2/lock.svg" alt="" class="field-icon">
                        <input type="password" placeholder="비밀번호" readonly>
                    </div>
                    
                    <div class="btn-login">로그인</div>
                    
                    <div class="or-divider">
                        <span class="line"></span>
                        <span class="text">or</span>
                        <span class="line"></span>
                    </div>

                    <div class="btn-kakao">
                        <img src="./images2/kakao.svg" alt=""> 카카오 로그인
                    </div>

                    <p class="forgot-link">비밀번호를 잊으셨나요?</p>
                </div>
            </div>

            <div class="white-box signup-link">
                <p>계정이 없으신가요? <span class="blue-bold">가입하기</span></p>
            </div>

            <div class="download-info">
                <p>앱을 다운로드 하세요.</p>
                <div class="store-btns">
                    <img src="./images2/google app.svg" alt="Google Play">
                    <img src="./images2/apple app.svg" alt="App Store">
                </div>
            </div>
        </section>

    </main>
</body>
</html>
